worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;

    # Allow large file uploads (images / videos)
    client_max_body_size 50M;

    # Timeouts for slow ML analysis requests
    proxy_read_timeout    120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;

    upstream backend_up {
        server backend:8000;
    }

    upstream frontend_up {
        server frontend:80;
    }

    server {
        listen 80;

        # ── MinIO media files ─────────────────────────────────────────
        location /files/ {
            proxy_pass         http://minio:9000/humdard-media/;
            proxy_set_header   Host minio;
            expires            7d;
            add_header         Cache-Control "public";
        }

        # ── Backend API ───────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend_up;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── React SPA (all other routes) ─────────────────────────────
        location / {
            proxy_pass         http://frontend_up;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            # Support Vite HMR websocket in dev (no-op in prod)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
